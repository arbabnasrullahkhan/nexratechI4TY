<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Strict Anti-Clickjacking Frame Buster -->
    <style id="antiClickjack">body{display:none !important;}</style>
    <script>if(self===top){document.getElementById('antiClickjack').remove();}else{top.location=self.location;}</script>
    <title>Manage Licenses | Nexra Tech PK</title>
    <!-- Maximum Security Robots Directives -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="theme-color" content="#020202">
    <link rel="icon" type="image/png" id="dynamic-favicon" href="">
    <link rel="apple-touch-icon" id="dynamic-apple-icon" href="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800;900&family=Fira+Code:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/licenses.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="/firebaseconfig.js"></script>
</head>
<body data-theme="dark" class="lic-theme">
    <div id="toast-container" aria-live="polite"></div>
    <div id="header-mount"></div>
    
    <!-- Auth Guard Spinner -->
    <div id="lic-guard" class="lic-guard">
        <div class="lic-guard-icon"><i class="fa-solid fa-key fa-beat"></i></div>
        <p class="tech-font" style="margin-top:16px; font-weight:800; color:#3b82f6;">Verifying Vault Access...</p>
    </div>

    <!-- MAIN UI -->
    <main id="lic-main" class="lic-container" style="display:none;" role="main">
        
        <div class="lic-header">
            <h1 class="tech-font"><i class="fa-solid fa-server" style="color:#3b82f6;"></i> Active Software Licenses</h1>
            <p>Manage your software activation keys, view expirations, and remotely revoke unauthorized devices.</p>
        </div>

        <div class="lic-grid" id="lic-grid">
            <!-- Skeleton Loader -->
            <div class="lic-card skeleton"></div>
            <div class="lic-card skeleton"></div>
        </div>

    </main>

    <div id="dock-mount"></div>
    <div id="footer-mount"></div>
    <script src="/js/app.js"></script>
    <script src="/components/loader.js"></script>
    <script src="/js/licenses.js"></script>
    <script>
        (function(){
            const t=localStorage.getItem('nexra_theme');
            if(t==='dark')document.body.setAttribute('data-theme','dark');
            NexraComponents.load([
                {file:'/components/header.html',mount:'#header-mount'},
                {file:'/components/dock.html',  mount:'#dock-mount'},
                {file:'/components/footer.html',mount:'#footer-mount'}
            ]).then(()=>NexraLicenses.init()).catch(()=>NexraLicenses.init());
        })();
    </script>
</body>
</html>
