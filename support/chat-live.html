<!DOCTYPE html>
<html lang="en" dir="ltr">
<!--
  ============================================================================
  NEXRA TECH PK — REAL-TIME SUPPORT & AI CHAT (support/chat-live.html)
  ============================================================================
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <style id="antiClickjack">body{display:none !important;}</style>
    <script>if(self===top){document.getElementById('antiClickjack').remove();}else{top.location=self.location;}</script>
    <title>Live Support | Nexra Tech PK</title>
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="theme-color" content="#020202">
    <link rel="icon" type="image/png" id="dynamic-favicon" href="">
    <link rel="apple-touch-icon" id="dynamic-apple-icon" href="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="/firebaseconfig.js"></script>
    <!-- Canvas for Image Attachment Compression -->
    <canvas id="chat-canvas" style="display:none;"></canvas>
</head>
<body data-theme="dark" style="overflow:hidden;">
    <div id="toast-container" aria-live="polite"></div>
    <div id="header-mount"></div>

    <div id="chat-guard" class="chat-guard">
        <div class="chat-guard-icon"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
        <p class="tech-font">Connecting to secure server...</p>
    </div>

    <main id="chat-main" class="chat-container" hidden role="main">
        
        <!-- Context Header (Order Details) -->
        <div class="chat-header">
            <div class="ch-left">
                <button class="ch-back-btn" onclick="window.history.back()"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="ch-info">
                    <h1 class="tech-font ch-title" id="ticket-title">Support Ticket</h1>
                    <div class="ch-sub" id="ticket-status"><span class="status-dot"></span> Connecting...</div>
                </div>
            </div>
            <div class="ch-engine-toggle">
                <button id="btn-human-req" class="ch-btn-human" onclick="NexraChat.requestHuman()"><i class="fa-solid fa-headset"></i> Talk to Human</button>
            </div>
        </div>

        <div class="chat-context-banner" id="order-context" style="display:none;">
            <i class="fa-solid fa-box-open"></i>
            <div style="flex:1;">
                <strong>Order Context:</strong> <span id="oc-title">Loading...</span>
            </div>
            <div id="oc-price" style="font-weight:800; color:var(--brand-main);"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-messages" id="chat-messages">
            <!-- Messages injected here -->
            <div class="chat-bubble left ai-greeting">
                <div class="cb-avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="cb-content">
                    <div class="cb-sender">Nexra AI Assistant <i class="fa-solid fa-circle-check" style="color:#10b981; font-size:10px;"></i></div>
                    <div class="cb-text">Hello! I am your AI assistant. How can I help you with your order today?</div>
                    <div class="cb-time">Just now</div>
                </div>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="chat-typing-indicator" id="typing-indicator" style="display:none;">
            <div class="cb-avatar"><i class="fa-solid fa-robot" id="typer-icon"></i></div>
            <div class="typing-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Image Attachment Preview -->
        <div class="chat-attach-preview" id="attach-preview" style="display:none;">
            <img id="ap-img" src="" alt="Attachment Preview">
            <button class="ap-remove" onclick="NexraChat.removeAttachment()"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <button class="ci-btn" onclick="document.getElementById('chat-file-input').click()"><i class="fa-solid fa-paperclip"></i></button>
            <input type="file" id="chat-file-input" accept="image/*" style="display:none;" onchange="NexraChat.processImage(event)">
            
            <textarea id="chat-input" class="ci-textarea" placeholder="Type your message..." rows="1" oninput="NexraChat.autoResize(this)" onkeypress="NexraChat.handleEnter(event)"></textarea>
            
            <button class="ci-btn-send" id="btn-send" onclick="NexraChat.sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

    </main>

    <!-- Note: Footer is intentionally excluded to allow the chat UI to consume full height on mobile -->
    <script src="/js/app.js"></script>
    <script src="/components/loader.js"></script>
    <script src="/js/chat.js"></script>
    <script>
        (function(){
            const t=localStorage.getItem('nexra_theme');
            if(t==='dark')document.body.setAttribute('data-theme','dark');
            NexraComponents.load([
                {file:'/components/header.html',mount:'#header-mount'}
            ]).then(()=>NexraChat.init()).catch(()=>NexraChat.init());
        })();
    </script>
</body>
</html>
