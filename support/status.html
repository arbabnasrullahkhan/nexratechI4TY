<!DOCTYPE html>
<html lang="en" dir="ltr">
<!--
  ============================================================================
  NEXRA TECH PK — SYSTEM STATUS HUB (support/status.html)
  ============================================================================
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>System Status | Nexra Tech PK</title>
    <meta name="description" content="Real-time system status, uptime monitor, and incident logs for Nexra Tech PK services.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#020202">
    <link rel="icon" type="image/png" id="dynamic-favicon" href="">
    <link rel="apple-touch-icon" id="dynamic-apple-icon" href="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/status.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="/firebaseconfig.js"></script>
    <!-- JSON-LD SEO Schema for System Status dynamically generated in JS -->
    <script type="application/ld+json" id="status-seo-schema"></script>
</head>
<body data-theme="dark">
    <div id="toast-container" aria-live="polite"></div>
    <div id="header-mount"></div>

    <main class="status-container" role="main">
        
        <!-- Global Status Banner -->
        <div class="status-hero" id="global-status-banner">
            <div class="sh-icon"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
            <h1 class="tech-font sh-title">Checking Systems...</h1>
            <p class="sh-sub">Retrieving live diagnostic data from Firebase.</p>
        </div>

        <!-- Services Grid -->
        <div class="status-section">
            <h2 class="tech-font ss-title">Core Services</h2>
            <div class="status-grid" id="services-grid">
                <!-- Skeleton Loading -->
                <div class="ss-card skeleton"></div>
                <div class="ss-card skeleton"></div>
                <div class="ss-card skeleton"></div>
                <div class="ss-card skeleton"></div>
            </div>
        </div>

        <!-- Incident History Timeline -->
        <div class="status-section" style="margin-top: 40px;">
            <h2 class="tech-font ss-title">Past Incidents</h2>
            <div class="incident-timeline" id="incident-timeline">
                <!-- Skeleton -->
                <div class="inc-item skeleton" style="height:100px; width:100%;"></div>
            </div>
        </div>

    </main>

    <div id="dock-mount"></div>
    <div id="footer-mount"></div>
    <script src="/js/app.js"></script>
    <script src="/components/loader.js"></script>
    <script src="/js/status.js"></script>
    <script>
        (function(){
            const t=localStorage.getItem('nexra_theme');
            if(t==='dark')document.body.setAttribute('data-theme','dark');
            NexraComponents.load([
                {file:'/components/header.html',mount:'#header-mount'},
                {file:'/components/dock.html',  mount:'#dock-mount'},
                {file:'/components/footer.html',mount:'#footer-mount'}
            ]).then(()=>NexraStatus.init()).catch(()=>NexraStatus.init());
        })();
    </script>
</body>
</html>
